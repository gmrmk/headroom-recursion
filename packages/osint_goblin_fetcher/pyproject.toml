[project]
name = "osint-goblin-fetcher"
version = "2026.05.0"
description = "OSINT Goblin -- Scrapling 4-tier fetch facade with normalized FetchResult."
requires-python = ">=3.11,<3.14"
dependencies = [
  "osint-goblin-schemas",
  "scrapling>=0.4.7",
  "pydantic>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/osint_goblin_fetcher"]

[tool.uv.sources]
osint-goblin-schemas = { workspace = true }
