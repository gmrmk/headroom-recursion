[project]
name = "osint-goblin-forensics"
version = "2026.05.0"
description = "OSINT Goblin -- hash chain + Ed25519 + RFC3161 evidence forensics (L0: stdlib + cryptography only). Hosts standalone verify.py for evidence-package zips."
requires-python = ">=3.11,<3.14"
dependencies = [
  "cryptography>=43",
]

[project.scripts]
osint-goblin-verify = "osint_goblin_forensics.verify:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/osint_goblin_forensics"]

[tool.pytest.ini_options]
markers = [
  "real_network: hits a live network endpoint (e.g. freetsa.org). Skipped by default; run via `pytest -m real_network` on the weekly battery (Yuki phase4/03-qa.md sec.8 mocking policy tier C).",
]
