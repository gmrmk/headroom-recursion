        [project]
        name = "osint-goblin-opsec"
        version = "2026.05.0"
        description = "OSINT Goblin — osint_goblin_opsec package."
        requires-python = ">=3.11,<3.14"
        dependencies = [
  "osint-goblin-schemas",
  "pydantic>=2.9"
]

        [build-system]
        requires = ["hatchling"]
        build-backend = "hatchling.build"

        [tool.hatch.build.targets.wheel]
        packages = ["src/osint_goblin_opsec"]

[tool.uv.sources]
osint-goblin-schemas = { workspace = true }
