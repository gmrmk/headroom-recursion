repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: agpl-import-lint
        name: AGPL import lint
        # Pin to project venv to avoid stale uv-managed Python with corrupt _sre extension.
        entry: python tools/ci/agpl_import_lint.py
        language: system
        pass_filenames: false
        types: [python]
      - id: llm-import-lint
        name: LLM import lint (target-data-handling policy)
        # Enforces docs/security/target-data-handling-policy.md -- no LLM
        # provider library may be imported into worker/api/packages.
        # Target data must never reach an LLM (user directive 2026-05-11).
        entry: python tools/ci/llm_import_lint.py
        language: system
        pass_filenames: false
        types: [python]
      - id: module-dag-lint
        name: Module DAG lint (home-grown, Sora ADR-0002)
        entry: python tools/ci/module_dag_lint.py packages
        language: system
        pass_filenames: false
        types: [python]
      - id: import-linter-layered
        name: Module DAG lint (import-linter, Sora ADR-0022 / Camille phase6)
        # Runs ALONGSIDE module-dag-lint for one sprint to validate parity.
        # Retire the home-grown lint once the two have agreed for a sprint.
        # Invoked via a Python shim because pre-commit's language: system
        # subprocess doesn't have the venv Scripts/ dir on PATH.
        entry: python tools/ci/run_import_linter.py
        language: system
        pass_filenames: false
        types: [python]
      - id: ps1-ascii-only
        name: PowerShell .ps1 ASCII-only (Priya WI-0125b)
        # Catches em-dashes, section signs, smart-quotes that PowerShell on Win11
        # reads as cp1252 garbage and breaks parsing.
        entry: python tools/ci/ps1_ascii_lint.py
        language: system
        pass_filenames: true
        files: \.ps1$
      - id: rubric-coverage-lint
        name: Dossier-section rubric-coverage lint (ADR-0026)
        # Asserts every `severity_basis: "matrix:<id>"` literal in
        # apps/web/src/lib/dossier-shape.ts (and breach-synthesis.ts) resolves
        # to an entry in apps/web/src/lib/severity-rubric.ts RUBRIC.
        # Mechanism mirrors ADR-0022 import-linter: a string-convention
        # contract the type system cannot enforce.
        entry: python tools/ci/rubric_coverage_lint.py
        language: system
        pass_filenames: false
        files: ^apps/web/src/lib/(dossier-shape|severity-rubric|breach-synthesis)\.ts$
