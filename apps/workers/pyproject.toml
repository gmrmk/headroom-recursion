        [project]
        name = "osint-goblin-workers"
        version = "2026.05.0"
        description = "OSINT Goblin — osint_goblin_workers package."
        requires-python = ">=3.11,<3.14"
        dependencies = [
  "osint-goblin-schemas",
  "osint-goblin-db",
  "osint-goblin-ftm",
  "osint-goblin-opsec",
  "osint-goblin-fetcher",
  "osint-goblin-adapters",
  "osint-goblin-attestation",
  "osint-goblin-evidence-pipeline",
  "osint-goblin-forensics",
  "dramatiq[redis,watch]>=1.17"
]

        [build-system]
        requires = ["hatchling"]
        build-backend = "hatchling.build"

        [tool.hatch.build.targets.wheel]
        packages = ["src/osint_goblin_workers"]

[tool.uv.sources]
osint-goblin-schemas = { workspace = true }
osint-goblin-db = { workspace = true }
osint-goblin-ftm = { workspace = true }
osint-goblin-opsec = { workspace = true }
osint-goblin-fetcher = { workspace = true }
osint-goblin-adapters = { workspace = true }
osint-goblin-attestation = { workspace = true }
osint-goblin-evidence-pipeline = { workspace = true }
osint-goblin-forensics = { workspace = true }
